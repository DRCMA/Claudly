name: claudly
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^18.0.1
  flutter_localizations:
    sdk: flutter
  page_flip: ^0.2.5+1
